name: Job Search Cycle

on:
  schedule:
    # Horarios "humanos" de Santiago (UTC-4 en invierno chileno):
    # Lun-Vie 9:00, 13:00, 16:00 Santiago → 13, 17, 20 UTC del mismo día.
    - cron: "0 13,17,20 * * 1-5"
    # Lun-Vie 20:00 y 23:00 Santiago → 00 y 03 UTC del día siguiente (mar-sáb UTC).
    - cron: "0 0,3 * * 2-6"
    # Fin de semana: una posible corrida al mediodía; el job la salta
    # aleatoriamente ~50% de las veces para no ser predecible.
    - cron: "0 16 * * 6,0"
  workflow_dispatch: {}

concurrency:
  group: job-search
  cancel-in-progress: false

jobs:
  run-cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Decidir si correr + jitter inicial
        id: gate
        run: |
          DOW=$(date -u +%u)  # 6=sábado, 7=domingo (UTC)
          if [ "$DOW" -ge 6 ] && [ $((RANDOM % 100)) -lt 50 ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Fin de semana: ciclo saltado aleatoriamente (anti-bot)"
            exit 0
          fi
          echo "run=true" >> "$GITHUB_OUTPUT"
          # Jitter de 0-15 min para no correr siempre a la hora exacta
          JITTER=$((RANDOM % 900))
          echo "Jitter inicial: ${JITTER}s"
          sleep "$JITTER"

      - uses: actions/checkout@v4
        if: steps.gate.outputs.run == 'true'

      - uses: actions/setup-node@v4
        if: steps.gate.outputs.run == 'true'
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        if: steps.gate.outputs.run == 'true'
        run: npm ci

      - name: Instalar navegador de Playwright
        if: steps.gate.outputs.run == 'true'
        run: npx playwright install --with-deps chromium

      - name: Ejecutar ciclo de búsqueda
        if: steps.gate.outputs.run == 'true'
        run: node cron/run-cycle.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MIN_SALARY: ${{ vars.MIN_SALARY || '840000' }}
          MAX_SALARY: ${{ vars.MAX_SALARY || '1200000' }}
          LOCATION: ${{ vars.LOCATION || 'Santiago' }}
          DAYS_BACK: ${{ vars.DAYS_BACK || '14' }}
          # Incluye aerolíneas y bienestar. Configura la variable SEARCH_TERMS
          # del repo con el mismo valor de .env.local para sobreescribir.
          SEARCH_TERMS: ${{ vars.SEARCH_TERMS || 'coordinador operaciones,supervisor logistica,mejora procesos,aerolíneas,bienestar' }}
          CANDIDATE_PROFILE: ${{ vars.CANDIDATE_PROFILE }}
          REST_CYCLE_PROB: ${{ vars.REST_CYCLE_PROB || '0.3' }}
